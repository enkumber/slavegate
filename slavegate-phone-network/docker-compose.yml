services:
  phone-network-server:
    image: ghcr.io/enkumber/slavegate-server:latest
    restart: unless-stopped
    ports:
      - "${APP_PHONE_NETWORK_PORT:-3000}:3000"
    environment:
      # Server
      NODE_ENV: production
      PORT: 3000

      # Database — PostgreSQL
      DATABASE_URL: postgresql://phoneNetwork:phoneNetwork_umbrel@phone-network-db:5432/phoneNetwork

      # Nostr relay configuration
      NOSTR_ENABLED: "true"
      NOSTR_RELAY_PRIMARY: ${NOSTR_RELAY_PRIMARY:-ws://nostr-relay_web_1:7777}
      NOSTR_RELAY_SECONDARY: ${NOSTR_RELAY_SECONDARY:-}

      # Optional: inject pre-existing secret key (hex). If unset, server will
      # load from DB (nostr_server_keys table) or auto-generate on first run.
      NOSTR_SECRET_KEY: ${NOSTR_SECRET_KEY:-}

      # Optional: key used to encrypt the Nostr secret key at rest in DB
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}

      # API & Auth
      API_KEY: "24018503cf6bd0ae1e5b1f829a5f66cf23fc2160aea90dff3b91427419cec746"
      JWT_SECRET: "88e43882eb6af62fc45ee602ed1b2d91789e81e695071c7e0740587c7b12023f"
      CREDENTIAL_ENCRYPTION_KEY: "d3b10ccdd00f9c5fff603deeb009f9e893a53b0a2781a0ee01740ade8c838c52"
      DASHBOARD_USERNAME: "admin"
      DASHBOARD_PASSWORD: "62fa93907efb78288aaa826d0a8dd6f1"

      # Data directory (keys, SQLite fallback, uploads)
      DATA_DIR: /data

    volumes:
      - ${APP_DATA_DIR:-./data}/phone-network:/data

    networks:
      - default

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    hostname: phone-network-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: phoneNetwork
      POSTGRES_USER: phoneNetwork
      POSTGRES_PASSWORD: phoneNetwork_umbrel
    volumes:
      - ${APP_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoneNetwork -d phoneNetwork"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  default:
    name: umbrel_main_network
    external: true
