services:
  phone-network-server:
    image: ghcr.io/enkumber/slavegate-server:latest
    restart: unless-stopped
    ports:
      - "${APP_PHONE_NETWORK_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://phoneNetwork:${POSTGRES_PASSWORD:-changeme}@phone-network-db:5432/phoneNetwork
      REDIS_URL: redis://phone-network-redis:6379
      NOSTR_ENABLED: "true"
      NOSTR_RELAY_PRIMARY: ${NOSTR_RELAY_PRIMARY:-ws://nostr-relay_relay_1:8080}
      NOSTR_RELAY_SECONDARY: ${NOSTR_RELAY_SECONDARY:-}
      NOSTR_RELAY_PUBLIC: ${NOSTR_RELAY_PUBLIC:-ws://192.168.50.57:4848}
      NOSTR_SECRET_KEY: ${NOSTR_SECRET_KEY:-}
      API_KEY: ${API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      DATA_DIR: /data
    volumes:
      - ${APP_DATA_DIR:-./data}/phone-network:/data
    networks:
      - default
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis:
    hostname: phone-network-redis
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  postgres:
    hostname: phone-network-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: phoneNetwork
      POSTGRES_USER: phoneNetwork
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ${APP_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoneNetwork -d phoneNetwork"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  default:
    name: umbrel_main_network
    external: true
