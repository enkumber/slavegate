services:
  phone-network-server:
    image: ghcr.io/enkumber/slavegate-server:latest
    restart: unless-stopped
    ports:
      - "${APP_PHONE_NETWORK_PORT:-3000}:3000"
    environment:
      # Server
      NODE_ENV: production
      PORT: 3000

      # Database — PostgreSQL
      DATABASE_URL: ${DATABASE_URL:-postgresql://phoneNetwork:${POSTGRES_PASSWORD}@postgres:5432/phoneNetwork}

      # Nostr relay configuration
      NOSTR_ENABLED: "true"
      NOSTR_RELAY_PRIMARY: ${NOSTR_RELAY_PRIMARY:-ws://nostr-relay_web_1:7777}
      NOSTR_RELAY_SECONDARY: ${NOSTR_RELAY_SECONDARY:-}

      # Optional: inject pre-existing secret key (hex). If unset, server will
      # load from DB (nostr_server_keys table) or auto-generate on first run.
      NOSTR_SECRET_KEY: ${NOSTR_SECRET_KEY:-}

      # Optional: key used to encrypt the Nostr secret key at rest in DB
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}

      # Data directory (keys, SQLite fallback, uploads)
      DATA_DIR: /data

    volumes:
      - ${APP_DATA_DIR:-./data}/phone-network:/data

    networks:
      - default

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: phoneNetwork
      POSTGRES_USER: phoneNetwork
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - ${APP_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoneNetwork -d phoneNetwork"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  default:
    name: umbrel_main_network
    external: true
