manifestVersion: 1

id: slavegate-phone-network
name: Phone Network
tagline: Manage and orchestrate Android devices via Nostr
icon: https://raw.githubusercontent.com/dan-ciprian/phone-network/main/assets/icon.png

category: automation
version: "3.0.0"
port: 3000

developer: Dan
website: https://github.com/dan-ciprian/phone-network
repo: https://github.com/dan-ciprian/phone-network
support: https://github.com/dan-ciprian/phone-network/issues

description: >-
  Phone Network server for remote Android fleet management.
  Communicates with devices through Nostr relay for NAT-friendly,
  encrypted messaging.

  Features:
  - Fleet management for Android devices
  - Nostr-based encrypted device communication (NIP-04 / NIP-17)
  - Real-time job dispatch: tap, swipe, type, screenshot, OTA updates
  - Workflow automation engine with step verification
  - Device registry with health monitoring
  - Coordinate learning cache for reliable UI automation
  - Screen detection cascade (UI tree → OCR → VLM)

releaseNotes: >-
  v3.0.0: Nostr transport layer. NAT-friendly encrypted device messaging
  via configurable Nostr relay. Full fleet management API.

dependencies:
  - nostr-relay

submitter: Dan
submission: https://github.com/getumbrel/umbrel-apps
